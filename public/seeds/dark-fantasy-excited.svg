<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="mainGlow" cx="39.16%" cy="45.41%" r="70%">
      <stop offset="0%" stop-color="#EF476F" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#EF476F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#EF476F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="orbBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
    </filter>
  </defs>
  <!-- 1. 深色底 -->
  <rect width="1024" height="1024" fill="#0d0608"/>
  <!-- 2. 预设主色大径向辉光铺底 -->
  <rect width="1024" height="1024" fill="url(#mainGlow)"/>
  <!-- 3. 2 辅色 + 1 情绪色 模糊 orb -->
    <circle cx="551" cy="691" r="367" fill="#EF476F" filter="url(#orbBlur)" opacity="0.55"/>
    <circle cx="831" cy="307" r="381" fill="#6A0572" filter="url(#orbBlur)" opacity="0.55"/>
    <circle cx="447" cy="587" r="375" fill="#FFD166" filter="url(#orbBlur)" opacity="0.55"/>
  <!-- 4. feTurbulence 颗粒层（~8% 不透明度） -->
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.08"/>
  <!-- 5. 径向暗角 vignette -->
  <rect width="1024" height="1024" fill="url(#vignette)"/>
</svg>
