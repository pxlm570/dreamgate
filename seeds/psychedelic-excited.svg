<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="topWash" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#0b0a10" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="mainGlow" cx="46.97%" cy="43.85%" r="62%">
      <stop offset="0%" stop-color="#FF6B9D" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#FF6B9D" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FF6B9D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emoGlow" cx="27.05%" cy="60.45%" r="50%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#FFD166" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topLight" cx="50%" cy="4%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="46%" r="72%">
      <stop offset="58%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.72"/>
    </radialGradient>
    <filter id="orbBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="90"/></filter>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="42"/></filter>
    <filter id="starBlur" x="-400%" y="-400%" width="900%" height="900%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
  </defs>
  <!-- 1. 深色底 -->
  <rect width="1024" height="1024" fill="#0b0a10"/>
  <!-- 2. 主色/情绪色双径向辉光 -->
  <rect width="1024" height="1024" fill="url(#mainGlow)"/>
  <rect width="1024" height="1024" fill="url(#emoGlow)"/>
  <!-- 3. 4 个柔和 orb -->
    <circle cx="773" cy="146" r="473" fill="#FFD166" filter="url(#orbBlur)" opacity="0.5"/>
    <circle cx="319" cy="538" r="407" fill="#06D6A0" filter="url(#orbBlur)" opacity="0.42"/>
    <circle cx="640" cy="792" r="241" fill="#FFD166" filter="url(#orbBlur)" opacity="0.5"/>
    <circle cx="524" cy="540" r="199" fill="#FF6B9D" filter="url(#softBlur)" opacity="0.5"/>
  <!-- 4. 5 颗微光星点 -->
    <circle cx="622" cy="800" r="3" fill="#FFFFFF" filter="url(#starBlur)" opacity="0.66"/>
    <circle cx="312" cy="490" r="6" fill="#FFD166" filter="url(#starBlur)" opacity="0.52"/>
    <circle cx="847" cy="181" r="3" fill="#FFFFFF" filter="url(#starBlur)" opacity="0.38"/>
    <circle cx="537" cy="715" r="6" fill="#FFD166" filter="url(#starBlur)" opacity="0.69"/>
    <circle cx="227" cy="405" r="3" fill="#FFFFFF" filter="url(#starBlur)" opacity="0.55"/>
  <!-- 5. 顶部渐晕（光从上）+ 顶部柔光 -->
  <rect width="1024" height="1024" fill="url(#topWash)"/>
  <rect width="1024" height="1024" fill="url(#topLight)"/>
  <!-- 6. 细颗粒 -->
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.05"/>
  <!-- 7. 柔和暗角 -->
  <rect width="1024" height="1024" fill="url(#vignette)"/>
</svg>
