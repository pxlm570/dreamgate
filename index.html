<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07070d" />
    <meta
      name="description"
      content="DreamGate 梦境档案馆 —— 用 AI 生成统一美学的梦境插画，在 3D 走廊画廊里漫游你的潜意识藏品，累积情绪轨迹与重复符号，把转瞬即逝的梦做成可逛、可追踪、可分享的个人潜意识档案馆。"
    />
    <meta name="color-scheme" content="dark" />

    <!-- 社交分享 -->
    <meta property="og:title" content="DreamGate 梦境档案馆 — 你的个人潜意识档案馆" />
    <meta
      property="og:description"
      content="踏入镜之门，漫游你的梦境走廊。AI 梦境藏品 + 情绪/符号解析 + 3D 沉浸画廊。"
    />
    <meta property="og:type" content="website" />

    <title>DreamGate 梦境档案馆 — 你的个人潜意识档案馆</title>

    <!-- 字体：display 用 Cormorant Garamond（衬线优雅）+ Cinzel（仪式感）；body 用 Noto Serif SC（中文衬线）+ EB Garamond（英文衬线）；mono 用 JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body class="dg-no-flash">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
